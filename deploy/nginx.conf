# ─────────────────────────────────────────────────────────────────────────────
# Nginx config for auto_invest_AI
# Frontend domain : https://autoinvest.duckdns.org
# Backend domain  : https://autoinvestapi.duckdns.org
#
# HOW TO USE:
#   sudo cp nginx-frontend.conf /etc/nginx/sites-available/autoinvest
#   sudo cp nginx-backend.conf  /etc/nginx/sites-available/autoinvestapi
#   sudo ln -s /etc/nginx/sites-available/autoinvest    /etc/nginx/sites-enabled/
#   sudo ln -s /etc/nginx/sites-available/autoinvestapi /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl restart nginx
# ─────────────────────────────────────────────────────────────────────────────

# ── FRONTEND ─────────────────────────────────
server {
    listen 80;
    server_name autoinvest.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name autoinvest.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/autoinvest.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autoinvest.duckdns.org/privkey.pem;

    # Serve React build output
    root /home/azureuser/auto_invest_AI/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── BACKEND ──────────────────────────────────
server {
    listen 80;
    server_name autoinvestapi.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name autoinvestapi.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/autoinvestapi.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autoinvestapi.duckdns.org/privkey.pem;

    # Increase timeout for ML prediction endpoints (can take time)
    proxy_read_timeout  180;
    proxy_send_timeout  180;

    location / {
        proxy_pass         http://unix:/home/azureuser/auto_invest_AI/backend/autoinvest.sock;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Django static files (after collectstatic)
    location /static/ {
        alias /home/azureuser/auto_invest_AI/backend/staticfiles/;
    }
}
